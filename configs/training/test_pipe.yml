# Pipe 3-D velocity+pressure diffusion model (turbulent channel flow)
outdir: "exps"
data: "/home/brian/pde-policylearning-compressible/data/oc_full_0to100/snapshots_north.h5"
dataset_class: "training.dataset_pipe.PipeDataset"
resolution: 32
name: "__required__"
cond: false
arch: "ddpmpp-uno"
precond: "edm"
channel: null   # use all 4 channels (u, v, w, p)
DM_channel: null

# Noise sampler — separable RBF (per-dimension Cholesky, scales as O(N) per dim)
rbf_scale: 0.05

# Network
attn_resolutions: [4]
num_blocks: 2
fmult: 0.5
rank: 0.1
nn_resolution: null
cbase: 64
cres: [1, 2, 2, 2]
lr_rampup: 0

# Training
duration: 0.001
batch: 1
batch_gpu: 1
lr: 1.0e-4
ema: 0.5
dropout: 0.1
augment: 0.0
xflip: false

# Relative loss + noise: per-channel normalization so u, v, w, p contribute equally
relative_loss: true

grad_clip: 1.0
lr_decay: 0.0005
lr_decay_gamma: 0.5

# Performance
fp16: false
ls: 1
bench: true
cache: true
workers: 2

# I/O
tick: 10
snap: 1     # network-snapshot (model checkpoint) every tick
dump: 1     # full training-state dump every tick
seed: null
resume: null
dry_run: false

# Wandb
wandb: "online"
