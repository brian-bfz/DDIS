visualization:
  # New sweep runs write under this directory (relative to repo root). Keeps `exps/` tidy.
  # `aggregate_sweep_results.py` scans both `exps/` (legacy) and this folder.
  sweep_exps_outdir: exps/surrogate_sweep
  # One subfolder per sweep batch (matches the G{MMDD}_… style from generate_pde names).
  # `auto` -> G{MMDD}_{SLURM_ARRAY_JOB_ID} so each sbatch array lands together; override e.g. "G0320_studyA".
  sweep_session_subdir: auto
  # Optional: also nest by PDE under the session folder (default off).
  sweep_group_by_pde: false
  pdes:
    - name: poisson
      generation_config: configs/generation/poisson_backward.yaml
      checkpoint_dir: exps/no_surrogate/fno_pad/0318_113747-fno_poisson_forward_bs40_ep500_m64_p35M-oa5hfuiw
    - name: helmholtz
      generation_config: configs/generation/helmholtz_backward.yaml
      checkpoint_dir: exps/no_surrogate/fno_pad/0318_113747-fno_helmholtz_forward_bs40_ep500_m64_p35M-elhusgf4
    - name: ns-nonbounded
      generation_config: configs/generation/ns-nonbounded_backward.yaml
      checkpoint_dir: exps/no_surrogate/fno_pad/0318_113749-fno_ns-nonbounded_forward_bs40_ep500_m64_p35M-hcugvf91
